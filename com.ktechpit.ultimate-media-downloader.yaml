app-id: com.ktechpit.ultimate-media-downloader
base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: ultimate-media-downloader
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --env=PACKAGE_TYPE=flatpak
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --system-talk-name=org.freedesktop.GeoClue2
  - --system-talk-name=org.freedesktop.UPower.*

cleanup:
  - /include
  - /lib/cmake
  - /share/man
  - /share/doc
  - /lib/pkgconfig

cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - shared-modules/squashfs-tools/squashfs-tools.json
  - modules/mpv.yaml

  - name: libgumbo
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/google/gumbo-parser/archive/v0.10.1.tar.gz
        sha256: 28463053d44a5dfbc4b77bcf49c8cee119338ffa636cc17fc3378421d714efad
    cleanup:
      - '*.a'
      - '*.la'

  - name: ultimate-media-downloader
    buildsystem: simple
    build-commands:
      - unsquashfs -no-progress *.snap
      - install -Dm755 squashfs-root/usr/bin/ultimate-media-downloader ${FLATPAK_DEST}/bin/ultimate-media-downloader
      - cp -r squashfs-root/usr/share/icons ${FLATPAK_DEST}/share/
      - install -Dm644 squashfs-root/usr/share/applications/com.ktechpit.ultimate-media-downloader.desktop ${FLATPAK_DEST}/share/applications/com.ktechpit.ultimate-media-downloader.desktop
      - desktop-file-edit --set-icon=${FLATPAK_ID} ${FLATPAK_DEST}/share/applications/com.ktechpit.ultimate-media-downloader.desktop
      - install -Dm644 squashfs-root/usr/share/metainfo/com.ktechpit.ultimate-media-downloader.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.ktechpit.ultimate-media-downloader.metainfo.xml
    sources:
        # =========================
        # x86_64 (amd64) – stable
        # =========================
        - type: file
          # Get stable amd64 snap URL:
          # curl -H 'Snap-Device-Series: 16' https://api.snapcraft.io/v2/snaps/info/ultimate-media-downloader | jq -r '.["channel-map"][] | select(.channel.architecture=="amd64" and   .channel.risk=="stable" and .channel.track=="latest") | .download.url'
          url: https://api.snapcraft.io/api/v1/snaps/download/mqCImuZBihW5Od6DMGOZ3BQqwLN9i3LW_56.snap

          # Get sha256:
          # curl -Ls https://api.snapcraft.io/api/v1/snaps/download/mqCImuZBihW5Od6DMGOZ3BQqwLN9i3LW_56.snap | sha256sum
          sha256: 9753be1742f09b6ef35c5ba092b287816ee176154d006be27d7b96293565a8f4

          only-arches:
            - x86_64

        # =========================
        # arm64 (aarch64) – stable
        # =========================
        - type: file
          # Get stable arm64 snap URL:
          # curl -H 'Snap-Device-Series: 16' https://api.snapcraft.io/v2/snaps/info/ultimate-media-downloader | jq -r '.["channel-map"][] | select(.channel.architecture=="arm64" and  .channel.risk=="stable" and .channel.track=="latest") | .download.url'
          url: https://api.snapcraft.io/api/v1/snaps/download/mqCImuZBihW5Od6DMGOZ3BQqwLN9i3LW_55.snap

          # Get sha256:
          # curl -Ls https://api.snapcraft.io/api/v1/snaps/download/mqCImuZBihW5Od6DMGOZ3BQqwLN9i3LW_55.snap | sha256sum
          sha256: 530fe7fe58b1c0c2294eba5759a642f091a0e7dec0a3eaba89268b3291ef41e2

          only-arches:
            - aarch64
